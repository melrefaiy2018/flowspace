# FlowSpace — Docker Compose
#
# Usage:
#   docker compose up -d
#
# The image is pulled from GitHub Container Registry.
# To build locally instead, uncomment the `build:` block and comment out `image:`.

services:
  flowspace:
    image: ghcr.io/melrefaiy2018/flowspace:latest
    # build:
    #   context: .
    #   secrets:
    #     - oauth_client_id
    #     - oauth_client_secret
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - flowspace-data:/data
    environment:
      PORT: "3000"
      NODE_ENV: production
      FLOWSPACE_PRODUCTION: "1"
      FLOWSPACE_DATA_DIR: /data
      FLOWSPACE_BIND_HOST: "0.0.0.0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# secrets:
#   oauth_client_id:
#     environment: OAUTH_CLIENT_ID
#   oauth_client_secret:
#     environment: OAUTH_CLIENT_SECRET

volumes:
  flowspace-data:
